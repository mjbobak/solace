version: '3.8'

services:
  home-app-launcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: home-app-launcher
    ports:
      - '8080:8080'
    volumes:
      # Persist mutable application data outside the source tree
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
