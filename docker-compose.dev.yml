version: '3.8'

services:
  frontend:
    image: node:22.13.0
    container_name: home-launcher-frontend-dev
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

  backend:
    image: python:3.12-slim
    container_name: home-launcher-backend-dev
    working_dir: /app
    volumes:
      - ./:/app
      - ./data:/app/data
    ports:
      - '8000:8000'
    command: >
      bash -c "pip install -r requirements.txt &&
               uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - PYTHONUNBUFFERED=1
      - DEV_MODE=true
